<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velas 7 Dias - Umbanda</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* [Manter todos os estilos da página de alguidares] */
    </style>
</head>
<body>
    <header>
        <!-- [Manter todo o cabeçalho da página de alguidares] -->
    </header>

    <main class="container">
        <div class="product-grid">
            <!-- Vela 7 Dias Branca -->
            <div class="product-card">
                <div class="product-gallery">
                    <div class="main-product-image-container">
                        <img id="main-image-v7d1" src="img/vela-7dias-branca.jpg" alt="Vela 7 Dias Branca" class="main-product-image">
                    </div>
                    <div class="gallery-thumbnails">
                        <img src="img/vela-7dias-branca.jpg" alt="Vela 7 Dias Branca - Detalhe 1" onclick="changeMainImage('main-image-v7d1', this.src, this.alt)">
                        <img src="img/vela-7dias-branca-2.jpg" alt="Vela 7 Dias Branca - Detalhe 2" onclick="changeMainImage('main-image-v7d1', this.src, this.alt)">
                    </div>
                </div>
                <div class="product-info">
                    <h2>Vela 7 Dias Branca</h2>
                    <p class="product-description">
                        Vela de 7 dias branca, ideal para trabalhos espirituais de proteção, paz e harmonia. Queima contínua por 7 dias.
                    </p>
                    <p class="price" data-price="18.00">R$ 18,00</p>
                    <div class="quantity-control">
                        <button class="decrease" onclick="decreaseQuantity('quantity-v7d1')">-</button>
                        <input type="number" id="quantity-v7d1" value="1" min="1" max="99">
                        <button class="increase" onclick="increaseQuantity('quantity-v7d1')">+</button>
                    </div>
                    <p class="total-price">Total: R$ <span id="total-price-v7d1">18,00</span></p>
                    <div class="buttons">
                        <button class="add-to-cart" onclick="addToCart('Vela 7 Dias Branca', 18.00, 'quantity-v7d1')">
                            <i class="fas fa-shopping-cart"></i> Adicionar ao carrinho
                        </button>
                        <button class="add-to-wishlist">
                            <i class="fas fa-heart"></i> Adicionar à lista de desejos
                        </button>
                    </div>
                </div>
            </div>

            <!-- [Adicionar outros produtos da mesma categoria seguindo o mesmo padrão] -->
        </div>
    </main>

    <!-- [Manter o mesmo rodapé e JavaScript da página de alguidares] -->
</body>
</html>
