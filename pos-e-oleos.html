<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pós e Óleos - Umbanda</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* [Manter todos os estilos da página de alguidares] */
    </style>
</head>
<body>
    <header>
        <!-- [Manter todo o cabeçalho da página de alguidares] -->
    </header>

    <main class="container">
        <div class="product-grid">
            <!-- Óleo Essencial de Arruda -->
            <div class="product-card">
                <div class="product-gallery">
                    <div class="main-product-image-container">
                        <img id="main-image-po1" src="img/oleo-arruda.jpg" alt="Óleo Essencial de Arruda" class="main-product-image">
                    </div>
                    <div class="gallery-thumbnails">
                        <img src="img/oleo-arruda.jpg" alt="Óleo Essencial de Arruda - Detalhe 1" onclick="changeMainImage('main-image-po1', this.src, this.alt)">
                        <img src="img/oleo-arruda-2.jpg" alt="Óleo Essencial de Arruda - Detalhe 2" onclick="changeMainImage('main-image-po1', this.src, this.alt)">
                    </div>
                </div>
                <div class="product-info">
                    <h2>Óleo Essencial de Arruda</h2>
                    <p class="product-description">
                        Óleo essencial de arruda 10ml, puro e natural, para proteção e limpeza espiritual.
                    </p>
                    <p class="price" data-price="32.00">R$ 32,00</p>
                    <div class="quantity-control">
                        <button class="decrease" onclick="decreaseQuantity('quantity-po1')">-</button>
                        <input type="number" id="quantity-po1" value="1" min="1" max="99">
                        <button class="increase" onclick="increaseQuantity('quantity-po1')">+</button>
                    </div>
                    <p class="total-price">Total: R$ <span id="total-price-po1">32,00</span></p>
                    <div class="buttons">
                        <button class="add-to-cart" onclick="addToCart('Óleo Essencial de Arruda', 32.00, 'quantity-po1')">
                            <i class="fas fa-shopping-cart"></i> Adicionar ao carrinho
                        </button>
                        <button class="add-to-wishlist">
                            <i class="fas fa-heart"></i> Adicionar à lista de desejos
                        </button>
                    </div>
                </div>
            </div>

            <!-- [Adicionar outros produtos da mesma categoria seguindo o mesmo padrão] -->
        </div>
    </main>

    <!-- [Manter o mesmo rodapé e JavaScript da página de alguidares] -->
</body>
</html>
