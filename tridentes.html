<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tridentes - Umbanda</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* [Manter todos os estilos da página de alguidares] */
    </style>
</head>
<body>
    <header>
        <!-- [Manter todo o cabeçalho da página de alguidares] -->
    </header>

    <main class="container">
        <div class="product-grid">
            <!-- Tridente de Metal Pequeno -->
            <div class="product-card">
                <div class="product-gallery">
                    <div class="main-product-image-container">
                        <img id="main-image-tri1" src="img/tridente-metal.jpg" alt="Tridente de Metal Pequeno" class="main-product-image">
                    </div>
                    <div class="gallery-thumbnails">
                        <img src="img/tridente-metal.jpg" alt="Tridente de Metal Pequeno - Detalhe 1" onclick="changeMainImage('main-image-tri1', this.src, this.alt)">
                        <img src="img/tridente-metal-2.jpg" alt="Tridente de Metal Pequeno - Detalhe 2" onclick="changeMainImage('main-image-tri1', this.src, this.alt)">
                    </div>
                </div>
                <div class="product-info">
                    <h2>Tridente de Metal Pequeno</h2>
                    <p class="product-description">
                        Tridente ritualístico em metal, 20cm, utilizado em trabalhos espirituais e rituais de proteção.
                    </p>
                    <p class="price" data-price="45.00">R$ 45,00</p>
                    <div class="quantity-control">
                        <button class="decrease" onclick="decreaseQuantity('quantity-tri1')">-</button>
                        <input type="number" id="quantity-tri1" value="1" min="1" max="99">
                        <button class="increase" onclick="increaseQuantity('quantity-tri1')">+</button>
                    </div>
                    <p class="total-price">Total: R$ <span id="total-price-tri1">45,00</span></p>
                    <div class="buttons">
                        <button class="add-to-cart" onclick="addToCart('Tridente de Metal Pequeno', 45.00, 'quantity-tri1')">
                            <i class="fas fa-shopping-cart"></i> Adicionar ao carrinho
                        </button>
                        <button class="add-to-wishlist">
                            <i class="fas fa-heart"></i> Adicionar à lista de desejos
                        </button>
                    </div>
                </div>
            </div>

            <!-- [Adicionar outros produtos da mesma categoria seguindo o mesmo padrão] -->
        </div>
    </main>

    <!-- [Manter o mesmo rodapé e JavaScript da página de alguidares] -->
</body>
</html>
