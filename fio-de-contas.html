<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fio de Contas - Umbanda</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* [Manter todos os estilos da página de alguidares] */
    </style>
</head>
<body>
    <header>
        <!-- [Manter todo o cabeçalho da página de alguidares] -->
    </header>

    <main class="container">
        <div class="product-grid">
            <!-- Fio de Contas de Oxum -->
            <div class="product-card">
                <div class="product-gallery">
                    <div class="main-product-image-container">
                        <img id="main-image-fc1" src="img/fio-oxum.jpg" alt="Fio de Contas de Oxum" class="main-product-image">
                    </div>
                    <div class="gallery-thumbnails">
                        <img src="img/fio-oxum.jpg" alt="Fio de Contas de Oxum - Detalhe 1" onclick="changeMainImage('main-image-fc1', this.src, this.alt)">
                        <img src="img/fio-oxum-2.jpg" alt="Fio de Contas de Oxum - Detalhe 2" onclick="changeMainImage('main-image-fc1', this.src, this.alt)">
                    </div>
                </div>
                <div class="product-info">
                    <h2>Fio de Contas de Oxum</h2>
                    <p class="product-description">
                        Colar de contas amarelas e douradas, dedicado à Orixá Oxum, com 16 contas e pingente.
                    </p>
                    <p class="price" data-price="45.00">R$ 45,00</p>
                    <div class="quantity-control">
                        <button class="decrease" onclick="decreaseQuantity('quantity-fc1')">-</button>
                        <input type="number" id="quantity-fc1" value="1" min="1" max="99">
                        <button class="increase" onclick="increaseQuantity('quantity-fc1')">+</button>
                    </div>
                    <p class="total-price">Total: R$ <span id="total-price-fc1">45,00</span></p>
                    <div class="buttons">
                        <button class="add-to-cart" onclick="addToCart('Fio de Contas de Oxum', 45.00, 'quantity-fc1')">
                            <i class="fas fa-shopping-cart"></i> Adicionar ao carrinho
                        </button>
                        <button class="add-to-wishlist">
                            <i class="fas fa-heart"></i> Adicionar à lista de desejos
                        </button>
                    </div>
                </div>
            </div>

            <!-- [Adicionar outros produtos da mesma categoria seguindo o mesmo padrão] -->
        </div>
    </main>

    <!-- [Manter o mesmo rodapé e JavaScript da página de alguidares] -->
</body>
</html>
