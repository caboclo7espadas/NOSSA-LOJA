<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedras Naturais - Umbanda</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* [Manter todos os estilos da página de alguidares] */
    </style>
</head>
<body>
    <header>
        <!-- [Manter todo o cabeçalho da página de alguidares] -->
    </header>

    <main class="container">
        <div class="product-grid">
            <!-- Quartzo Branco -->
            <div class="product-card">
                <div class="product-gallery">
                    <div class="main-product-image-container">
                        <img id="main-image-pn1" src="img/quartzo-branco.jpg" alt="Quartzo Branco" class="main-product-image">
                    </div>
                    <div class="gallery-thumbnails">
                        <img src="img/quartzo-branco.jpg" alt="Quartzo Branco - Detalhe 1" onclick="changeMainImage('main-image-pn1', this.src, this.alt)">
                        <img src="img/quartzo-branco-2.jpg" alt="Quartzo Branco - Detalhe 2" onclick="changeMainImage('main-image-pn1', this.src, this.alt)">
                    </div>
                </div>
                <div class="product-info">
                    <h2>Quartzo Branco</h2>
                    <p class="product-description">
                        Pedra de quartzo branco natural, aproximadamente 3cm, excelente para energização e purificação.
                    </p>
                    <p class="price" data-price="28.00">R$ 28,00</p>
                    <div class="quantity-control">
                        <button class="decrease" onclick="decreaseQuantity('quantity-pn1')">-</button>
                        <input type="number" id="quantity-pn1" value="1" min="1" max="99">
                        <button class="increase" onclick="increaseQuantity('quantity-pn1')">+</button>
                    </div>
                    <p class="total-price">Total: R$ <span id="total-price-pn1">28,00</span></p>
                    <div class="buttons">
                        <button class="add-to-cart" onclick="addToCart('Quartzo Branco', 28.00, 'quantity-pn1')">
                            <i class="fas fa-shopping-cart"></i> Adicionar ao carrinho
                        </button>
                        <button class="add-to-wishlist">
                            <i class="fas fa-heart"></i> Adicionar à lista de desejos
                        </button>
                    </div>
                </div>
            </div>

            <!-- [Adicionar outros produtos da mesma categoria seguindo o mesmo padrão] -->
        </div>
    </main>

    <!-- [Manter o mesmo rodapé e JavaScript da página de alguidares] -->
</body>
</html>
