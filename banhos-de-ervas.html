<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banhos de Ervas - Umbanda</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* [Manter todos os estilos da página de alguidares] */
    </style>
</head>
<body>
    <header>
        <!-- [Manter todo o cabeçalho da página de alguidares] -->
    </header>

    <main class="container">
        <div class="product-grid">
            <!-- Banho de Descarga -->
            <div class="product-card">
                <div class="product-gallery">
                    <div class="main-product-image-container">
                        <img id="main-image-be1" src="img/banho-descarga.jpg" alt="Banho de Descarga" class="main-product-image">
                    </div>
                    <div class="gallery-thumbnails">
                        <img src="img/banho-descarga.jpg" alt="Banho de Descarga - Detalhe 1" onclick="changeMainImage('main-image-be1', this.src, this.alt)">
                        <img src="img/banho-descarga-2.jpg" alt="Banho de Descarga - Detalhe 2" onclick="changeMainImage('main-image-be1', this.src, this.alt)">
                    </div>
                </div>
                <div class="product-info">
                    <h2>Banho de Descarga</h2>
                    <p class="product-description">
                        Kit completo para banho de descarga energética, contendo ervas selecionadas para limpeza espiritual.
                    </p>
                    <p class="price" data-price="35.00">R$ 35,00</p>
                    <div class="quantity-control">
                        <button class="decrease" onclick="decreaseQuantity('quantity-be1')">-</button>
                        <input type="number" id="quantity-be1" value="1" min="1" max="99">
                        <button class="increase" onclick="increaseQuantity('quantity-be1')">+</button>
                    </div>
                    <p class="total-price">Total: R$ <span id="total-price-be1">35,00</span></p>
                    <div class="buttons">
                        <button class="add-to-cart" onclick="addToCart('Banho de Descarga', 35.00, 'quantity-be1')">
                            <i class="fas fa-shopping-cart"></i> Adicionar ao carrinho
                        </button>
                        <button class="add-to-wishlist">
                            <i class="fas fa-heart"></i> Adicionar à lista de desejos
                        </button>
                    </div>
                </div>
            </div>

            <!-- [Adicionar outros produtos da mesma categoria seguindo o mesmo padrão] -->
        </div>
    </main>

    <!-- [Manter o mesmo rodapé e JavaScript da página de alguidares] -->
</body>
</html>
