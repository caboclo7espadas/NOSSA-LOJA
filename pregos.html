<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pregos - Umbanda</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* [Manter todos os estilos da página de alguidares] */
    </style>
</head>
<body>
    <header>
        <!-- [Manter todo o cabeçalho da página de alguidares] -->
    </header>

    <main class="container">
        <div class="product-grid">
            <!-- Pregos de Ferro para Trabalhos -->
            <div class="product-card">
                <div class="product-gallery">
                    <div class="main-product-image-container">
                        <img id="main-image-pr1" src="img/pregos-ferro.jpg" alt="Pregos de Ferro para Trabalhos" class="main-product-image">
                    </div>
                    <div class="gallery-thumbnails">
                        <img src="img/pregos-ferro.jpg" alt="Pregos de Ferro para Trabalhos - Detalhe 1" onclick="changeMainImage('main-image-pr1', this.src, this.alt)">
                        <img src="img/pregos-ferro-2.jpg" alt="Pregos de Ferro para Trabalhos - Detalhe 2" onclick="changeMainImage('main-image-pr1', this.src, this.alt)">
                    </div>
                </div>
                <div class="product-info">
                    <h2>Pregos de Ferro para Trabalhos</h2>
                    <p class="product-description">
                        Kit com 7 pregos de ferro forjado, tamanho médio (10cm), utilizados em trabalhos espirituais.
                    </p>
                    <p class="price" data-price="25.00">R$ 25,00</p>
                    <div class="quantity-control">
                        <button class="decrease" onclick="decreaseQuantity('quantity-pr1')">-</button>
                        <input type="number" id="quantity-pr1" value="1" min="1" max="99">
                        <button class="increase" onclick="increaseQuantity('quantity-pr1')">+</button>
                    </div>
                    <p class="total-price">Total: R$ <span id="total-price-pr1">25,00</span></p>
                    <div class="buttons">
                        <button class="add-to-cart" onclick="addToCart('Pregos de Ferro para Trabalhos', 25.00, 'quantity-pr1')">
                            <i class="fas fa-shopping-cart"></i> Adicionar ao carrinho
                        </button>
                        <button class="add-to-wishlist">
                            <i class="fas fa-heart"></i> Adicionar à lista de desejos
                        </button>
                    </div>
                </div>
            </div>

            <!-- [Adicionar outros produtos da mesma categoria seguindo o mesmo padrão] -->
        </div>
    </main>

    <!-- [Manter o mesmo rodapé e JavaScript da página de alguidares] -->
</body>
</html>
